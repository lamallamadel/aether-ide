name: Docs Quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs.yml"
      - "package.json"
      - "package-lock.json"
      - ".markdownlint.json"
  push:
    branches:
      - master
    paths:
      - "**/*.md"
      - ".github/workflows/docs.yml"
      - "package.json"
      - "package-lock.json"
      - ".markdownlint.json"

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run markdown lint
        run: npm run docs:lint

  link-check:
    name: Markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-mail
            --retry-wait-time 2
            --max-retries 2
            --accept 200,206,301,302,429
            --exclude-path docs/archive/**
            README.md
            settings.md
            CONTRIBUTING.md
            docs/**/*.md
            DOC_REVIEW_2026-03-31.md
