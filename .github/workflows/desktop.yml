# Build installateurs Electron par OS (artefacts dans release/).
name: Desktop

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  electron:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Desktop build
        run: npm run desktop:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aether-desktop-${{ matrix.os }}
          path: release/**
          if-no-files-found: warn
